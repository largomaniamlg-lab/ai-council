<svg viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1200" fill="#f1f5f9"/>

  <!-- Header -->
  <rect width="800" height="260" fill="url(#headerGrad)"/>
  <circle cx="400" cy="90" r="34" fill="#f8fafc"/>
  <circle cx="330" cy="150" r="24" fill="#dc2626"/>
  <circle cx="382" cy="168" r="24" fill="#7c3aed"/>
  <circle cx="440" cy="168" r="24" fill="#059669"/>
  <circle cx="486" cy="145" r="24" fill="#0891b2"/>
  <circle cx="300" cy="120" r="18" fill="#db2777"/>
  <text x="400" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">AI Council on iPhone</text>

  <!-- Platform badge -->
  <rect x="330" y="20" width="140" height="40" rx="20" fill="#ffffff" opacity="0.15"/>
  <text x="400" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Safari (iOS)</text>

  <!-- Step 1 -->
  <g transform="translate(60,300)">
    <circle cx="35" cy="35" r="35" fill="#0f172a"/>
    <text x="35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">1</text>
    <rect x="90" y="0" width="590" height="120" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="115" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Open the link in Safari</text>
    <text x="115" y="65" font-family="Arial, sans-serif" font-size="17" fill="#475569">It has to be Safari, not Chrome or another browser</text>
    <rect x="115" y="78" width="520" height="32" rx="16" fill="#f1f5f9"/>
    <text x="130" y="99" font-family="monospace" font-size="15" fill="#0891b2">ai-council-one-kappa.vercel.app</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(60,450)">
    <circle cx="35" cy="35" r="35" fill="#0f172a"/>
    <text x="35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">2</text>
    <rect x="90" y="0" width="590" height="110" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="115" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Tap the Share icon</text>
    <text x="115" y="65" font-family="Arial, sans-serif" font-size="17" fill="#475569">The square icon in the bottom bar</text>
    <rect x="480" y="20" width="60" height="60" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M 510 35 L 510 65 M 498 45 L 510 33 L 522 45 M 496 62 L 496 70 L 524 70 L 524 62" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(60,590)">
    <circle cx="35" cy="35" r="35" fill="#0f172a"/>
    <text x="35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">3</text>
    <rect x="90" y="0" width="590" height="110" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="115" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Find "Add to Home Screen"</text>
    <text x="115" y="65" font-family="Arial, sans-serif" font-size="17" fill="#475569">Scroll down the menu until you see it</text>
    <rect x="115" y="78" width="330" height="30" rx="8" fill="#f1f5f9"/>
    <text x="130" y="99" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">&#8862; Add to Home Screen</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(60,730)">
    <circle cx="35" cy="35" r="35" fill="#0f172a"/>
    <text x="35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">4</text>
    <rect x="90" y="0" width="590" height="110" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="115" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Tap "Add" in the top right</text>
    <text x="115" y="65" font-family="Arial, sans-serif" font-size="17" fill="#475569">Confirm the name "AI Council" and tap Add</text>
    <rect x="500" y="20" width="90" height="40" rx="10" fill="#0f172a"/>
    <text x="545" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#ffffff">Add</text>
  </g>

  <!-- Done -->
  <g transform="translate(60,870)">
    <circle cx="35" cy="35" r="35" fill="#059669"/>
    <text x="35" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#ffffff">&#10003;</text>
    <rect x="90" y="0" width="590" height="110" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="115" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#065f46">Done</text>
    <text x="115" y="70" font-family="Arial, sans-serif" font-size="17" fill="#047857">The AI Council icon is now on your home screen</text>
  </g>

  <text x="400" y="1020" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">AI Council</text>
</svg>
